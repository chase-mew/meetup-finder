<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#ffffff" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", theme);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", theme === "dark" ? "#171a21" : "#ffffff");
        } catch (e) {}
      })();
    </script>
    <title>Meetup Finder — meet in the fairest spot</title>
    <meta
      name="description"
      content="Find the fairest place to meet by real public transport travel time and venue rating."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Meetup Finder" />
    <meta
      property="og:description"
      content="Meet in the spot that is fairest for everyone, ranked by real travel time and venue rating."
    />
    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
