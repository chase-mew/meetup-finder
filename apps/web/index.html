<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#ffffff" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", theme);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", theme === "dark" ? "#171a21" : "#ffffff");
        } catch (e) {}
      })();
    </script>
    <title>Meetup Finder: meet in the fairest spot</title>
    <link rel="canonical" href="https://meetup-finder.pages.dev/" />
    <meta
      name="description"
      content="Find the fairest place to meet by real public transport travel time and venue rating."
    />

    <!-- Open Graph (Facebook, LinkedIn, Slack, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Meetup Finder" />
    <meta property="og:url" content="https://meetup-finder.pages.dev/" />
    <meta property="og:title" content="Meetup Finder: meet in the fairest spot" />
    <meta
      property="og:description"
      content="Meet in the spot that is fairest for everyone, ranked by real public transport travel time and venue rating."
    />
    <meta property="og:image" content="https://meetup-finder.pages.dev/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Meetup Finder: the fairest place to meet, ranked by real public transport time and venue rating."
    />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Meetup Finder: meet in the fairest spot" />
    <meta
      name="twitter:description"
      content="Meet in the spot that is fairest for everyone, ranked by real public transport travel time and venue rating."
    />
    <meta name="twitter:image" content="https://meetup-finder.pages.dev/og-image.png" />
    <meta name="twitter:image:alt" content="Meetup Finder: the fairest place to meet." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
