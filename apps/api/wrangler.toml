name = "meetup-finder-api"
main = "src/index.ts"
compatibility_date = "2024-11-06"

# Local development reads GOOGLE_MAPS_API_KEY from apps/api/.dev.vars
# For deployment, set it as a secret:
#   wrangler secret put GOOGLE_MAPS_API_KEY
#
# Durable caching uses Workers KV. Without a binding the Worker falls back to
# an in memory cache, so this is optional. To enable it:
#   wrangler kv namespace create CACHE
# then put the returned id below and uncomment:
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# Rate limiting and abuse protection. The paid endpoints (/api/search and
# /api/geocode) are throttled per client, keyed by cf-connecting-ip, using a
# token bucket. State is stored in the CACHE KV namespace when bound, otherwise
# in an in memory store scoped to a single isolate. All values are optional.
[vars]
# Set to "false" to disable throttling entirely.
RATE_LIMIT_ENABLED = "true"
# Sustained requests per minute per client.
RATE_LIMIT_RPM = "30"
# Bucket capacity, i.e. the largest burst a client can make at once.
RATE_LIMIT_BURST = "15"
# Optional global daily request ceiling across all clients (0 disables it).
RATE_LIMIT_DAILY_MAX = "0"
